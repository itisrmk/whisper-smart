name: Release DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without v prefix (e.g. 0.2.18)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - production
      checklist_confirmed:
        description: "I confirm the release checklist has been completed"
        required: true
        default: false
        type: boolean
      notes:
        description: "Release notes"
        required: false
        type: string
  # Auto-release: every merged PR into main cuts a beta release with an
  # auto-bumped patch version. Opt out per-PR with the `skip-release` label.
  # Bump minor/major instead with `release:minor` / `release:major` labels.
  # Docs/CI-only PRs (see paths-ignore) never trigger a release.
  pull_request:
    types: [closed]
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "**.md"
      - "appcast.xml"

permissions:
  contents: write

concurrency:
  group: release-dmg
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !contains(github.event.pull_request.labels.*.name, 'skip-release'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For merged-PR runs, release the tip of main (the merge result),
          # not the PR merge ref.
          ref: ${{ github.event_name == 'pull_request' && 'main' || github.ref }}
          fetch-depth: 0

      - name: Resolve Release Parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_NOTES: ${{ inputs.notes }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUMP_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'release:minor') }}
          BUMP_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'release:major') }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
            CHANNEL="$INPUT_CHANNEL"
            NOTES="$INPUT_NOTES"
          else
            git fetch --tags --force
            LATEST="$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
            LATEST="${LATEST#v}"
            IFS=. read -r MAJOR MINOR PATCH <<< "${LATEST:-0.0.0}"
            if [[ "$BUMP_MAJOR" == "true" ]]; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [[ "$BUMP_MINOR" == "true" ]]; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            CHANNEL="beta"
            NOTES="${PR_TITLE} (#${PR_NUMBER})"
            # Auto-bumped versions must never overwrite an existing release.
            # (Manual dispatch stays lenient: a pre-pushed tag is reused.)
            if git ls-remote --tags origin "v${VERSION}" | grep -q "v${VERSION}"; then
              echo "Tag v${VERSION} already exists on origin — refusing to re-release it."
              exit 1
            fi
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to release with malformed version: '$VERSION'"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<NOTES_EOF"
            printf '%s\n' "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION} (${CHANNEL}) [trigger: ${EVENT_NAME}]"

      - name: Release Gate
        env:
          VERSION: ${{ steps.params.outputs.version }}
          ALLOW_ADHOC_SIGNING: 1
        run: bash scripts/release_gate.sh

      - name: Enforce Release Checklist Confirmation
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.checklist_confirmed }}
        run: |
          echo "Checklist confirmation is required before tagging a release."
          exit 1

      - name: Validate Signing Certificate Secrets
        env:
          CERT_P12: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          for var_name in CERT_P12 CERT_PASSWORD; do
            value="${!var_name:-}"
            if [[ -z "$value" ]]; then
              echo "Missing required signing secret: $var_name"
              exit 1
            fi
          done

      - name: Validate Production Notarization Secrets
        if: ${{ steps.params.outputs.channel == 'production' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for var_name in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            value="${!var_name:-}"
            if [[ -z "$value" ]]; then
              echo "Missing required production secret: $var_name"
              exit 1
            fi
          done

      - name: Import Signing Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Build Signed DMG
        env:
          VERSION: ${{ steps.params.outputs.version }}
          CHANNEL: ${{ steps.params.outputs.channel }}
        run: |
          set -euo pipefail
          IDENTITIES="$(security find-identity -v -p codesigning | grep -v 'CSSMERR' || true)"
          SIGNING_IDENTITY="$(printf '%s\n' "$IDENTITIES" | grep 'Developer ID Application' | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/' || true)"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            # Fallback: an Apple Development certificate still provides a
            # stable signing identity (macOS TCC permission grants persist
            # across updates), unlike ad-hoc signing. It cannot be notarized,
            # so it is only allowed for the beta channel until a Developer ID
            # Application certificate is provisioned.
            SIGNING_IDENTITY="$(printf '%s\n' "$IDENTITIES" | grep 'Apple Development' | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/' || true)"
            if [[ -n "$SIGNING_IDENTITY" && "$CHANNEL" == "production" ]]; then
              echo "Production channel requires a Developer ID Application certificate; only an Apple Development identity is available."
              exit 1
            fi
          fi
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No usable codesigning identity found after certificate import."
            exit 1
          fi
          echo "Signing with identity: $SIGNING_IDENTITY"
          CODESIGN_IDENTITY="$SIGNING_IDENTITY" VERSION="$VERSION" bash scripts/package_dmg.sh

      - name: Notarize Production DMG
        if: ${{ steps.params.outputs.channel == 'production' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG_PATH=".build/release/Whisper-Smart-mac.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Resolve Previous Tag
        id: previous_tag
        env:
          VERSION: ${{ steps.params.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          CURRENT_TAG="v${VERSION}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          echo "value=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Compose Release Notes
        id: release_notes
        env:
          VERSION: ${{ steps.params.outputs.version }}
          INPUT_NOTES: ${{ steps.params.outputs.notes }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.value }}
          REPOSITORY: ${{ github.repository }}
          CHANNEL: ${{ steps.params.outputs.channel }}
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"
          if [[ -n "${INPUT_NOTES}" ]]; then
            printf "%s\n\n" "${INPUT_NOTES}" >> "$NOTES_FILE"
          else
            printf "Automated DMG release for v%s.\n\n" "${VERSION}" >> "$NOTES_FILE"
          fi
          printf "Release channel: **%s**\n\n" "${CHANNEL}" >> "$NOTES_FILE"
          printf "Release artifact: \`.build/release/Whisper-Smart-mac.dmg\`\n\n" >> "$NOTES_FILE"
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            printf "Rollback reference: https://github.com/%s/releases/tag/%s\n" "${REPOSITORY}" "${PREVIOUS_TAG}" >> "$NOTES_FILE"
          else
            printf "Rollback reference: none (first tagged release).\n" >> "$NOTES_FILE"
          fi
          echo "path=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Update Appcast
        env:
          VERSION: ${{ steps.params.outputs.version }}
          NOTES_FILE: ${{ steps.release_notes.outputs.path }}
          REPOSITORY: ${{ github.repository }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          APP_PLIST=".build/release/Whisper Smart.app/Contents/Info.plist"
          DMG_PATH=".build/release/Whisper-Smart-mac.dmg"
          if [[ ! -f "$APP_PLIST" ]]; then
            echo "Missing built app plist at $APP_PLIST"
            exit 1
          fi
          if [[ ! -f "$DMG_PATH" ]]; then
            echo "Missing DMG at $DMG_PATH"
            exit 1
          fi

          BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PLIST")"
          SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PLIST")"
          if [[ "$SHORT_VERSION" != "$VERSION" ]]; then
            echo "App short version ($SHORT_VERSION) does not match requested release version ($VERSION)"
            exit 1
          fi

          DMG_LENGTH="$(stat -f%z "$DMG_PATH")"
          DMG_URL="https://github.com/${REPOSITORY}/releases/download/v${VERSION}/Whisper-Smart-mac.dmg"
          PUB_DATE="$(LC_ALL=C date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          SIGN_TOOL=".build/artifacts/sparkle/Sparkle/bin/sign_update"
          if [[ ! -x "$SIGN_TOOL" ]]; then
            echo "Missing Sparkle sign_update tool at $SIGN_TOOL"
            exit 1
          fi
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "Missing required secret: SPARKLE_PRIVATE_KEY"
            exit 1
          fi
          ED_SIGNATURE="$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SIGN_TOOL" --ed-key-file - -p "$DMG_PATH" | tr -d '\n')"
          if [[ -z "$ED_SIGNATURE" ]]; then
            echo "Failed to generate Sparkle edSignature for $DMG_PATH"
            exit 1
          fi

          bash scripts/update_appcast.sh \
            --version "$VERSION" \
            --build-version "$BUILD_VERSION" \
            --dmg-url "$DMG_URL" \
            --dmg-length "$DMG_LENGTH" \
            --ed-signature "$ED_SIGNATURE" \
            --notes-file "$NOTES_FILE" \
            --pub-date "$PUB_DATE" \
            --output "appcast.xml"

      - name: Verify Appcast
        run: bash scripts/verify_appcast.sh appcast.xml

      - name: Commit + Push Appcast
        env:
          VERSION: ${{ steps.params.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- appcast.xml; then
            echo "No appcast change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore(release): update appcast for v${VERSION}"
          # Keep legacy Sparkle clients (old SUFeedURL -> master) receiving updates.
          git push origin HEAD:main HEAD:master

      - name: Create and Push Tag
        env:
          VERSION: ${{ steps.params.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally."
          else
            git tag "${TAG}"
          fi
          if git ls-remote --tags origin "${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin."
          else
            git push origin "${TAG}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.params.outputs.version }}
          name: v${{ steps.params.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            .build/release/Whisper-Smart-mac.dmg
            appcast.xml
